version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: customer_management_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: customer_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: