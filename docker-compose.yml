version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: customer_management_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: customer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: