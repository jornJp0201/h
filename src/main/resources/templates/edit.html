<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客情報の編集</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            background-color: #f5f5f5;
        }

        .input-field {
            width: 300px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #ffffff;
            box-sizing: border-box;
        }

        .send-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #28a745; /* 編集用に緑系に変更（お好みで） */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }

        .send-btn:hover {
            background-color: #218838;
        }

        .cancel-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            margin-left: 8px;
        }

        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <h1>顧客情報の編集</h1>


    <div>
        <!-- 💡 更新用URLへ送信 (th:object で Java から受け取った customerEntity をバインド) -->
        <form th:action="@{/customers/create/All/Save}" method="post" th:object="${customerEntity}">
            

            <!-- 💡 超重要：更新処理時に「どのデータを更新するか」を特定するため ID を hidden で持つ -->
            <input type="hidden" th:field="*{customerId}" />

            <h3>*顧客名</h3> 
            <!-- th:field="*{xxx}" を書くことで、画面表示時に自動で既存の値が入ります -->
            <input type="text" class="input-field" th:field="*{customerName}">
            <div class="error-message" 
                 th:if="${#fields.hasErrors('customerName')}" 
                 th:errors="*{customerName}">
            </div>

            <h3>顧客メール</h3>
            <!-- 原本の name="customerEmail" を th:field="*{customerEmail}" に修正して自動値補完にします -->
            <input type="email" class="input-field" th:field="*{customerEmail}">

            <h3>*日付</h3> 
            <input type="date" class="input-field" th:field="*{date}">
            <div class="error-message" 
                 th:if="${#fields.hasErrors('date')}" 
                 th:errors="*{date}">
            </div>

            <h3>備考</h3>
            <!-- textarea も th:field を指定すると既存のテキストが自動で流し込まれます -->
            <textarea class="input-field" th:field="*{text}"></textarea>

            <h3>アクティブ状態</h3>
            <!-- チェックボックスまたは選択肢が推奨ですが、元のテキスト形式にあわせています -->
            <input type="text" class="input-field" th:field="*{active}">
            
            <h3 style="margin-top: 20px;">
                <button type="submit" class="send-btn">更新</button>
                <a th:href="@{/customers/table}" class="cancel-btn">キャンセル</a>
            </h3>

        </form>
    </div>
</body>
</html>
