<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            background-color: #f5f5f5;
        }

        .input-field {
            width: 300px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #ffffff;
            box-sizing: border-box;
        }

        .send-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }

        .send-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>新規登録</h1>
    <div>
        <form th:action="@{/customers/create/All/Save}" method="post" th:object="${customerEntity}" >
            <span th:if="${not#strings.isEmpty(errorSave)}">
                 <a th:text="${errorSave}"></a>
            </span>

           <h3>*顧客名</h3> 
                 <input type="text" class="input-field" th:field="*{customerName}" placeholder="顧客名">
                 <div class="error-message" 
                    th:if="${#fields.hasErrors('customerName')}" 
                    th:errors="*{customerName}">
                 </div>
           <h3>顧客メール</h3>
                 <input type="text" class="input-field" name="customerEmail" placeholder="顧客メール">
           <h3>*日付</h3> 
                 <input type="date" class="input-field" th:field="*{date}" placeholder="日付">
                 <div class="error-message" 
                    th:if="${#fields.hasErrors('date')}" 
                    th:errors="*{date}">
                 </div>
           <h3>備考</h3>
                  <textarea class="input-field" name="text" placeholder="取引内容"></textarea>
            <h3>アクティブ状態</h3>
                  <input type="text" class="input-field" th:field="*{active}" placeholder="アクティブ状態" >
            
            <h3>
                <button type="submit" class="send-btn">登録</button>
            </h3>

        </form>
    


    </div>
    

</body>
</html>
